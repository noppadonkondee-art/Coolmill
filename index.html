<!-- โหลด ONNX Runtime Web แบบ WebGPU -->
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.webgpu.min.js"></script>

<script>
// แมป YOLO COCO Class IDs ไปยังกลุ่มที่เราต้องการแสดง
// COCO class index: 0 = person, 2 = car, 3 = motorcycle, 5 = bus, 7 = truck
const COCO_CLASSES = {
  0: 'person',
  2: 'car',
  3: 'motorcycle',
  5: 'bus',
  7: 'truck'
};

const CLASSES = {
  person:     { th:'คน',           color:'#FFC857' },
  car:        { th:'รถยนต์',        color:'#2EC4F1' },
  motorcycle: { th:'มอเตอร์ไซค์',   color:'#FF4D6D' }
};

const $ = id => document.getElementById(id);
const video = $('video'), canvas = $('canvas'), ctx = canvas.getContext('2d');

let session = null;
let running = false, busy = false;
let facing = 'environment', stream = null;
let linePos = 0.5, dragging = false;
let tracks = [], nextId = 1;
let totals = { person:0, car:0, motorcycle:0 };
let mv = { person:{s:0,l:0,r:0}, car:{s:0,l:0,r:0}, motorcycle:{s:0,l:0,r:0} };
const MV_TH = { s:'ตรงไป', l:'เลี้ยวซ้าย', r:'เลี้ยวขวา' };
const MV_ICON = { s:'↑', l:'↰', r:'↱' };
let log = [];
let lastT = 0, fpsAvg = 0;

// โหลดโมเดล YOLO11n / YOLO26n ONNX (แปลงมาสำหรับการใช้งาน Web)
const MODEL_URL = 'https://huggingface.co/Nomis/YOLO-ByteTrack-ONNX-Web/resolve/main/public/models/yolo11n.onnx';

window.onload = async () => {
  try {
    setStatus('ตรวจสอบเบราว์เซอร์และเตรียมพร้อมโมเดล...');
    
    // ตั้งพิกัดสำหรับ Web Assembly (WASM) ในกรณีที่ WebGPU ค้างหรือตกแต่งไม่ทัน
    ort.env.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/';

    // เลือกรันโมเดล WebGPU หากฮาร์ดแวร์รองรับ มิฉะนั้นจะเปลี่ยนเป็น WASM อัตโนมัติ
    let provider = 'wasm';
    if (navigator.gpu) {
      provider = 'webgpu';
      setStatus('ตรวจพบ WebGPU! กำลังโหลดโมเดล YOLOv11/12 (ขนาด ~11MB)...');
    } else {
      setStatus('ไม่พบ WebGPU (จะใช้โหมด WASM CPU เเทน) กำลังโหลดโมเดล...');
    }

    // ดาวน์โหลดและสร้าง Session ในการรันโมเดลผ่าน ORT
    session = await ort.InferenceSession.create(MODEL_URL, {
      executionProviders: [provider, 'wasm']
    });

    setStatus('ดาวน์โหลดและประมวลผลโมเดลเสร็จเรียบร้อย! พร้อมใช้งาน');
    $('hint').innerHTML = 'โหลดโมเดลเสร็จสมบูรณ์แล้ว!<br>เล็งกล้องไปที่ถนน แล้วกด “เริ่มนับ”<br>ลากเส้นสีเขียวไปวางตรงจุดที่ต้องการนับ';
    $('btnStart').disabled = false;
    $('btnFile').disabled = false;
  } catch (err) {
    console.error(err);
    setStatus('เกิดข้อผิดพลาดในการโหลดโมเดล: ' + err.message);
    $('hint').innerHTML = 'เกิดข้อผิดพลาดในการตั้งค่าระบบอัจฉริยะ:<br><span style="color:#FF4D6D;font-size:12px;">' + err.message + '</span>';
  }
};

/* ---------- ตัวดึงพิกเซลมาเปลี่ยนเป็น Float32 Tensor ขนาด 640x640 (สำหรับ YOLO) ---------- */
function preprocess(canvasElement) {
  const targetSize = 640;
  
  // บีบหรือดึงภาพลง Canvas ชั่วคราวเพื่อทำ Resize ให้อยู่ในขนาด 640x640
  const offscreen = document.createElement('canvas');
  offscreen.width = targetSize;
  offscreen.height = targetSize;
  const oCtx = offscreen.getContext('2d');
  oCtx.drawImage(canvasElement, 0, 0, targetSize, targetSize);
  
  const imgData = oCtx.getImageData(0, 0, targetSize, targetSize);
  const data = imgData.data;

  // จัดโครงสร้างข้อมูลแบบ NCHW (1, 3, 640, 640) และทำการหารสีเฉลี่ย 255.0
  const floatData = new Float32Array(3 * targetSize * targetSize);
  for (let i = 0; i < targetSize * targetSize; i++) {
    floatData[i] = data[i * 4] / 255.0;                      // R
    floatData[i + targetSize * targetSize] = data[i * 4 + 1] / 255.0;  // G
    floatData[i + 2 * targetSize * targetSize] = data[i * 4 + 2] / 255.0; // B
  }
  
  return new ort.Tensor('float32', floatData, [1, 3, targetSize, targetSize]);
}

/* ---------- อัลกอริทึมคัดกรองกรอบกล่องแบบทับซ้อน Non-Maximum Suppression (NMS) ---------- */
function iou(a, b) {
  const x1 = Math.max(a[0], b[0]), y1 = Math.max(a[1], b[1]);
  const x2 = Math.min(a[0]+a[2], b[0]+b[2]), y2 = Math.min(a[1]+a[3], b[1]+b[3]);
  const w = Math.max(0, x2 - x1), h = Math.max(0, y2 - y1);
  const inter = w * h;
  return inter / (a[2]*a[3] + b[2]*b[3] - inter + 1e-6);
}

function runNMS(boxes, scores, classIds, iouThreshold = 0.45) {
  const indices = Array.from({length: boxes.length}, (_, i) => i);
  // เรียงลำดับความมั่นใจจากมากไปหาน้อย
  indices.sort((a, b) => scores[b] - scores[a]);
  
  const keep = [];
  while (indices.length > 0) {
    const current = indices.shift();
    keep.push(current);
    for (let i = 0; i < indices.length; i++) {
      if (classIds[current] === classIds[indices[i]]) {
        const ov = iou(boxes[current], boxes[indices[i]]);
        if (ov > iouThreshold) {
          indices.splice(i, 1);
          i--;
        }
      }
    }
  }
  return keep.map(idx => ({ box: boxes[idx], score: scores[idx], classId: classIds[idx] }));
}

/* ---------- ดำเนินการคัดกรองผลลัพธ์ของโมเดล YOLO ---------- */
function postprocess(outputTensor, width, height, minConf) {
  // YOLOv11/12 จะมีรูปเเบบ Output ขนาด [1, 84, 8400]
  // 84 แถวแรกประกอบด้วย (cx, cy, w, h) และ Class Scores อีก 80 คลาส
  // 8400 คือจำนวน Grid-box ที่ทำนายออกมา
  const data = outputTensor.data;
  const numRows = outputTensor.dims[1]; // 84
  const numCols = outputTensor.dims[2]; // 8400
  
  const rawBoxes = [];
  const rawScores = [];
  const rawClasses = [];

  const scaleX = width / 640;
  const scaleY = height / 640;

  for (let c = 0; c < numCols; c++) {
    // หาคะแนนความมั่นใจสูงสุดของ Object คลาสต่างๆ
    let maxScore = 0;
    let bestClassId = -1;
    
    // สแกนตรวจสอบเฉพาะกลุ่มคลาสเป้าหมาย คน, รถยนต์, มอเตอร์ไซค์, รถบัส, รถบรรทุก
    for (const [id, label] of Object.entries(COCO_CLASSES)) {
      const idx = parseInt(id);
      const score = data[(4 + idx) * numCols + c];
      if (score > maxScore) {
        maxScore = score;
        bestClassId = idx;
      }
    }

    if (maxScore > minConf && bestClassId !== -1) {
      // แปลงพิกัดแบบ Normalized กลับคืนมาเป็นพิกัดภาพพิกเซล
      const cx = data[0 * numCols + c] * scaleX;
      const cy = data[1 * numCols + c] * scaleY;
      const w = data[2 * numCols + c] * scaleX;
      const h = data[3 * numCols + c] * scaleY;
      
      const x = cx - w / 2;
      const y = cy - h / 2;

      rawBoxes.push([x, y, w, h]);
      rawScores.push(maxScore);
      rawClasses.push(bestClassId);
    }
  }

  // เรียกใช้ NMS เพื่อสกัดกรอบที่ซ้อนกันเป็นกลุ่มเดียว
  return runNMS(rawBoxes, rawScores, rawClasses);
}

/* ---------- อัปเดตและเก็บข้อมูลการเคลื่อนที่ของแต่ละวัตถุ (Object Tracking) ---------- */
function updateTracks(dets){
  const used = new Set();
  
  for (const t of tracks){
    // คาดเดาพิกัดจากความเร็วเฟรมเดิม (Velocity Tracking) เพื่อป้องกันกล่องกะพริบหรือหายไปตอนคนบัง
    const px = t.cx + (t.vx * 1.3); 
    const py = t.cy + (t.vy * 1.3);
    const pbox = [t.box[0] + (t.vx * 1.3), t.box[1] + (t.vy * 1.3), t.box[2], t.box[3]];

    let best = -1, bestScore = 0;
    
    dets.forEach((d, i) => {
      if (used.has(i) || d.cls !== t.cls) return;
      const ov = iou(pbox, d.box);
      const dist = Math.hypot(px - d.cx, py - d.cy);
      
      const reach = Math.max(d.box[2], d.box[3], t.box[2], t.box[3]) * 2.8; 
      
      if (ov < 0.04 && dist > reach) return;
      
      // คำนวณคะแนนสำหรับการจับคู่วัตถุเฟรมเก่ากับเฟรมใหม่
      const score = (ov * 0.45) + (Math.max(0, 1 - dist / reach) * 0.55);
      if (score > bestScore){ bestScore = score; best = i; }
    });

    if (best >= 0){
      const d = dets[best]; used.add(best);
      t.prev = { x:t.cx, y:t.cy };
      t.vx = t.vx * 0.35 + (d.cx - t.cx) * 0.65;
      t.vy = t.vy * 0.35 + (d.cy - t.cy) * 0.65;
      t.box = d.box; t.cx = d.cx; t.cy = d.cy; t.missed = 0;
      t.path.push({ x:d.cx, y:d.cy });
      if (t.path.length > 50) t.path.shift();
    } else {
      // วัตถุถูกบัง: ไหลกล่องต่อไปข้างหน้าชั่วคราวก่อนสลายตัวไป
      t.missed++;
      t.prev = { x:t.cx, y:t.cy };
      t.vx *= 0.8; 
      t.vy *= 0.8;
      t.cx += t.vx; t.cy += t.vy;
      t.box = [t.box[0] + t.vx, t.box[1] + t.vy, t.box[2], t.box[3]];
    }
  }

  dets.forEach((d, i) => {
    if (used.has(i)) return;
    tracks.push({ 
      id:nextId++, cls:d.cls, box:d.box, cx:d.cx, cy:d.cy, 
      prev:null, vx:0, vy:0, path:[{x:d.cx, y:d.cy}], 
      missed:0, counted:false, pending:false, 
      entryVec:null, crossAt:null, mv:null, logIdx:-1 
    });
  });

  // ถือว่าสิ้นสุดการติดตามเมื่อไม่พบวัตถุนานเกิน 25 เฟรม
  tracks.filter(t => t.missed >= 25 && t.pending).forEach(t => resolveMove(t, true));
  tracks = tracks.filter(t => t.missed < 25);
}

function checkCrossing(){
  const axis = $('axis').value, dir = $('dir').value;
  const limit = axis === 'h' ? canvas.height * linePos : canvas.width * linePos;
  
  for (const t of tracks){
    if (t.counted || !t.prev) continue;
    const before = axis === 'h' ? t.prev.y : t.prev.x;
    const after  = axis === 'h' ? t.cy    : t.cx;
    
    // ตั้งค่า Buffer กันการตีกลับกระตุกบริเวณเส้นนับ
    const isCrossing = (before < limit - 4 && after >= limit + 4) || (before > limit + 4 && after <= limit - 4);
    if (!isCrossing) continue;

    const fwd = before < limit && after >= limit;
    const bwd = before > limit && after <= limit;
    
    if (dir === 'fwd' && !fwd) continue;
    if (dir === 'bwd' && !bwd) continue;
    
    t.counted = true;
    t.pending = true;
    t.crossAt = { x:t.cx, y:t.cy };
    t.entryVec = headingVec(t.path);       
    totals[t.cls]++;
    t.logIdx = log.length;
    log.push({ t:new Date().toISOString(), cls:t.cls, dir: fwd ? 'fwd' : 'bwd', mv:null });
    addTick(t.cls);
    $('n-' + t.cls).textContent = totals[t.cls];
  }
}

function headingVec(path, minLen){
  const min = minLen || 10;
  const last = path[path.length-1];
  for (let i = path.length - 2; i >= 0; i--){
    const dx = last.x - path[i].x, dy = last.y - path[i].y;
    if (Math.hypot(dx, dy) >= min) return { x:dx, y:dy };
  }
  return null;
}

function resolveMove(t, force){
  if (!t.pending) return;
  const dist = t.crossAt ? Math.hypot(t.cx - t.crossAt.x, t.cy - t.crossAt.y) : 0;
  const need = Math.max(canvas.width, canvas.height) * 0.16;
  if (!force && dist < need) return;

  const v1 = t.entryVec, v2 = headingVec(t.path, 12);
  let m = 's';
  if (v1 && v2){
    let cross = v1.x * v2.y - v1.y * v2.x;
    const dot = v1.x * v2.x + v1.y * v2.y;
    if (facing === 'user') cross = -cross;          
    const deg = Math.atan2(cross, dot) * 180 / Math.PI;
    const th = parseFloat($('ang').value);
    if (deg > th) m = 'r';
    else if (deg < -th) m = 'l';
  }
  t.pending = false;
  t.mv = m;
  mv[t.cls][m]++;
  if (t.logIdx >= 0) log[t.logIdx].mv = m;
  $(({s:'s', l:'l', r:'r'})[m] + '-' + t.cls).textContent = mv[t.cls][m];
}

function addTick(cls){
  const strip = $('tally');
  const el = document.createElement('span');
  el.className = 'tick';
  el.style.background = CLASSES[cls].color;
  strip.appendChild(el);
  while (strip.children.length > 60) strip.removeChild(strip.firstChild);
}

/* ---------- การวาดผลลัพธ์ลงบนแคนวาส ---------- */
function draw(){
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  const axis = $('axis').value;

  // วาดเส้นแนวแบ่งการนับ
  ctx.save();
  ctx.strokeStyle = '#7CFFB2';
  ctx.lineWidth = Math.max(2, canvas.width/300);
  ctx.setLineDash([14, 10]);
  ctx.beginPath();
  if (axis === 'h'){
    const y = canvas.height * linePos;
    ctx.moveTo(0, y); ctx.lineTo(canvas.width, y);
  } else {
    const x = canvas.width * linePos;
    ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
  }
  ctx.stroke();
  ctx.restore();

  // วาดกรอบสแกนตรวจจับ
  const fs = Math.max(12, canvas.width/55);
  ctx.font = `600 ${fs}px 'IBM Plex Sans Thai', sans-serif`;
  ctx.textBaseline = 'top';
  
  for (const t of tracks){
    if (t.missed > 5) ctx.globalAlpha = Math.max(0.15, 1 - (t.missed / 25));
    else ctx.globalAlpha = 1;
    
    const c = CLASSES[t.cls].color;
    ctx.strokeStyle = c;
    ctx.lineWidth = Math.max(2, canvas.width/400);
    ctx.strokeRect(t.box[0], t.box[1], t.box[2], t.box[3]);

    if (t.path.length > 2){
      ctx.save();
      ctx.globalAlpha = t.missed > 0 ? 0.15 : 0.55;
      ctx.setLineDash([]); ctx.strokeStyle = c; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(t.path[0].x, t.path[0].y);
      for (let i = 1; i < t.path.length; i++) ctx.lineTo(t.path[i].x, t.path[i].y);
      ctx.stroke();
      ctx.restore();
    }

    const label = CLASSES[t.cls].th + (t.mv ? ' ' + MV_ICON[t.mv] : (t.counted ? ' …' : ''));
    const w = ctx.measureText(label).width + 10;
    ctx.fillStyle = c;
    ctx.fillRect(t.box[0], Math.max(0, t.box[1] - fs - 6), w, fs + 6);
    ctx.fillStyle = '#0E1216';
    ctx.fillText(label, t.box[0] + 5, Math.max(0, t.box[1] - fs - 3));
  }
  ctx.globalAlpha = 1;
}

/* ---------- ลูปสำหรับรันโมเดล YOLO ถี่ตามความเร็วจอ ---------- */
async function loop(){
  if (!running) return;
  if (!busy){
    busy = true;
    try {
      // ดำเนินการ Preprocess เฟรมภาพปัจจุบัน
      const inputTensor = preprocess(canvas);
      
      // ป้อน Tensor ไปรันผ่านโครงข่าย YOLO (WebGPU-Accelerated)
      const outputs = await session.run({ images: inputTensor });
      
      // ดึงคีย์ผลลัพธ์แรกออกมาทำงานต่อ
      const outputKey = Object.keys(outputs)[0];
      const results = postprocess(outputs[outputKey], canvas.width, canvas.height, parseFloat($('conf').value));
      
      const heavy = $('heavy').checked;
      const dets = [];
      
      for (const r of results) {
        let rawCls = COCO_CLASSES[r.classId];
        // แปลงประเภทรถบัส/รถบรรทุก เป็นรถยนต์ทั่วไปหากเปิดใช้งานการจัดกลุ่ม
        if (heavy && (rawCls === 'bus' || rawCls === 'truck')) rawCls = 'car';
        
        if (CLASSES[rawCls]) {
          dets.push({
            cls: rawCls,
            box: r.box,
            cx: r.box[0] + r.box[2]/2,
            cy: r.box[1] + r.box[3]/2
          });
        }
      }

      // นำข้อมูลจุดที่ผ่านการสกัดแล้วอัปเดตโมดูลการติดตามทิศทาง
      updateTracks(dets);
      checkCrossing();
      tracks.forEach(t => resolveMove(t, false));
      
      const live = { person:0, car:0, motorcycle:0 };
      dets.forEach(d => live[d.cls]++);
      for (const k in live) $('live-' + k).textContent = 'ในภาพ ' + live[k];

      const now = performance.now();
      if (lastT){
        fpsAvg = fpsAvg ? fpsAvg*0.85 + (1000/(now-lastT))*0.15 : 1000/(now-lastT);
        $('fps').textContent = fpsAvg.toFixed(1) + ' fps · ตรวจจับ ' + dets.length + ' · แทร็ก ' + tracks.length;
      }
      lastT = now;
    } catch(e){
      console.error('Inference Error:', e);
    }
    busy = false;
  }
  draw();
  requestAnimationFrame(loop);
}

/* ---------- ตัวคุมพิกัดเลื่อนเส้นกั้น ---------- */
const stage = $('stage');
function movLine(e){
  const r = stage.getBoundingClientRect();
  const p = e.touches ? e.touches[0] : e;
  linePos = $('axis').value === 'h'
    ? (p.clientY - r.top) / r.height
    : (p.clientX - r.left) / r.width;
  linePos = Math.min(0.97, Math.max(0.03, linePos));
  tracks.forEach(t => t.counted = false);
}
stage.addEventListener('pointerdown', e => { dragging = true; movLine(e); });
stage.addEventListener('pointermove', e => { if (dragging) movLine(e); });
window.addEventListener('pointerup', () => dragging = false);

/* ---------- การควบคุมกล้องและพาร์ทควบคุม UI ---------- */
function setStatus(s, live){
  $('status').textContent = s;
  $('dot').classList.toggle('live', !!live);
}
$('conf').addEventListener('input', e => $('confVal').textContent = parseFloat(e.target.value).toFixed(2));
$('ang').addEventListener('input', e => $('angVal').textContent = e.target.value);

async function startCamera(){
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode:{ ideal: facing }, width:{ ideal:1280 }, height:{ ideal:720 } },
    audio: false
  });
  video.srcObject = stream;
  await video.play();
  video.style.opacity = 1;
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
}

$('btnStart').onclick = async () => {
  if (running){
    running = false;
    $('btnStart').textContent = 'เริ่มนับ';
    setStatus('หยุดชั่วคราว — ยอดสะสมยังอยู่ครบ');
    return;
  }
  $('btnStart').disabled = true;
  try {
    setStatus('กำลังขอสิทธิ์ใช้กล้อง…');
    await startCamera();
    $('hint').style.display = 'none';
    running = true;
    ['btnFlip','btnReset','btnCsv'].forEach(id => $(id).disabled = false);
    $('btnStart').textContent = 'หยุด';
    setStatus('กำลังนับด้วย YOLO — เล็งกล้องไปจุดที่ต้องการ', true);
    loop();
  } catch(err){
    setStatus('เปิดกล้องไม่ได้: ' + err.message);
    $('hint').innerHTML = 'เปิดกล้องไม่ได้<br><span style="font-size:12px">' + err.message +
      '<br><br>ตรวจสอบว่าหน้าเว็บเปิดด้วย HTTPS และอนุญาตสิทธิ์การใช้งานกล้องในเบราว์เซอร์แล้ว</span>';
    $('hint').style.display = 'block';
  }
  $('btnStart').disabled = false;
};

$('btnFile').onclick = () => $('fileIn').click();
$('fileIn').onchange = async (e) => {
  const f = e.target.files[0];
  if (!f) return;
  try {
    if (stream){ stream.getTracks().forEach(t => t.stop()); stream = null; }
    video.srcObject = null;
    video.src = URL.createObjectURL(f);
    video.loop = true;
    await video.play();
    video.style.opacity = 1;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    tracks = [];
    $('hint').style.display = 'none';
    running = true;
    ['btnFlip','btnReset','btnCsv'].forEach(id => $(id).disabled = false);
    $('btnFlip').disabled = true;
    $('btnStart').textContent = 'หยุด';
    setStatus('กำลังประมวลผลวิดีโอด้วย YOLO WebGPU', true);
    loop();
  } catch(err){
    setStatus('เล่นไฟล์ไม่ได้: ' + err.message);
  }
};

$('btnFlip').onclick = async () => {
  facing = facing === 'environment' ? 'user' : 'environment';
  try { await startCamera(); tracks = []; } catch(e){ setStatus('สลับกล้องไม่ได้: ' + e.message); }
};

$('btnReset').onclick = () => {
  totals = { person:0, car:0, motorcycle:0 };
  mv = { person:{s:0,l:0,r:0}, car:{s:0,l:0,r:0}, motorcycle:{s:0,l:0,r:0} };
  log = []; tracks = [];
  for (const k in totals){
    $('n-' + k).textContent = '0';
    ['s','l','r'].forEach(m => $(m + '-' + k).textContent = '0');
  }
  $('tally').innerHTML = '';
  setStatus('ล้างยอดแล้ว เริ่มนับใหม่จาก 0', running);
};

$('btnCsv').onclick = () => {
  if (!log.length) return setStatus('ยังไม่มีข้อมูลให้ส่งออก', running);
  const rows = ['เวลา,ประเภท,ข้ามเส้นทาง,การเลี้ยว'];
  log.forEach(r => rows.push(
    `${r.t},${CLASSES[r.cls].th},${r.dir === 'fwd' ? 'ลง/ขวา' : 'ขึ้น/ซ้าย'},${r.mv ? MV_TH[r.mv] : 'ยังไม่สรุป'}`));
  rows.push('', 'สรุป,ตรงไป,เลี้ยวซ้าย,เลี้ยวขวา,รวม');
  for (const k in totals) rows.push(`${CLASSES[k].th},${mv[k].s},${mv[k].l},${mv[k].r},${totals[k]}`);
  const blob = new Blob(['\uFEFF' + rows.join('\n')], { type:'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'traffic-yolo-count-' + new Date().toISOString().slice(0,19).replace(/[:T]/g,'-') + '.csv';
  a.click();
  URL.revokeObjectURL(a.href);
};
</script>
</body>
</html>
