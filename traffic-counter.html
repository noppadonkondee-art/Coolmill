<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ตัวนับจราจร — คน / รถยนต์ / มอเตอร์ไซค์</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0E1216;
    --panel:#171D24;
    --panel-2:#212A33;
    --line:#2E3945;
    --text:#E8EDF2;
    --muted:#8FA0B0;
    --person:#FFC857;
    --car:#2EC4F1;
    --moto:#FF4D6D;
    --ok:#7CFFB2;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--ink);
    color:var(--text);
    font-family:'IBM Plex Sans Thai',system-ui,sans-serif;
    display:flex;flex-direction:column;
    overflow:hidden;
    -webkit-tap-highlight-color:transparent;
  }
  .bar{
    display:flex;align-items:center;gap:10px;
    padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;
    border-bottom:1px solid var(--line);
    background:var(--panel);
  }
  .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex:none}
  .dot.live{background:var(--ok);box-shadow:0 0 0 0 rgba(124,255,178,.6);animation:pulse 1.6s infinite}
  @keyframes pulse{70%{box-shadow:0 0 0 8px rgba(124,255,178,0)}100%{box-shadow:0 0 0 0 rgba(124,255,178,0)}}
  #status{font-size:13px;color:var(--muted);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #fps{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}

  .stage{position:relative;flex:1;min-height:0;background:#000;overflow:hidden;touch-action:none}
  video,canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}
  video{opacity:0}
  .hint{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    text-align:center;color:var(--muted);font-size:14px;line-height:1.7;padding:20px;max-width:320px;
  }

  .tally{display:flex;gap:3px;align-items:flex-end;height:16px;padding:6px 14px 0;overflow:hidden}
  .tick{width:2px;height:12px;border-radius:1px;opacity:.9;animation:pop .25s ease-out}
  @keyframes pop{from{height:2px;opacity:0}}

  .counts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px 14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 12px;position:relative;overflow:hidden}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c)}
  .card h2{font-size:12px;font-weight:500;color:var(--muted);letter-spacing:.02em}
  .num{font-family:'IBM Plex Mono',monospace;font-size:30px;font-weight:600;font-variant-numeric:tabular-nums;line-height:1.15;color:var(--c)}
  .now{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)}
  .mv{display:flex;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);padding:2px 0 1px}
  .mv b{font-weight:600;color:var(--text);margin-left:2px;font-variant-numeric:tabular-nums}

  .controls{padding:4px 14px calc(env(safe-area-inset-bottom) + 12px);background:var(--panel);border-top:1px solid var(--line)}
  .row{display:flex;gap:8px;padding-top:10px;flex-wrap:wrap}
  button{
    flex:1;min-width:76px;padding:11px 10px;border-radius:10px;border:1px solid var(--line);
    background:var(--panel-2);color:var(--text);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;
  }
  button:active{transform:translateY(1px)}
  button:focus-visible{outline:2px solid var(--ok);outline-offset:2px}
  button.primary{background:var(--ok);border-color:var(--ok);color:#08130D;font-weight:600}
  button:disabled{opacity:.45}
  details{margin-top:10px}
  summary{font-size:13px;color:var(--muted);cursor:pointer;padding:4px 0;list-style:none}
  summary::after{content:" ▾"}
  details[open] summary::after{content:" ▴"}
  .set{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:13px}
  .set label{flex:1;color:var(--muted)}
  select,input[type=range]{font-family:inherit;font-size:13px;background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:6px 8px;accent-color:var(--ok)}
  input[type=range]{padding:0;width:130px}
  input[type=checkbox]{width:18px;height:18px;accent-color:var(--ok)}
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>

<div class="bar">
  <span class="dot" id="dot"></span>
  <span id="status">พร้อมเริ่ม — กดปุ่ม “เริ่มนับ”</span>
  <span id="fps"></span>
</div>

<div class="stage" id="stage">
  <video id="video" playsinline muted autoplay></video>
  <canvas id="canvas"></canvas>
  <div class="hint" id="hint">เล็งกล้องไปที่ถนนหรือทางเดิน แล้วกด “เริ่มนับ”<br>ลากเส้นสีเขียวไปวางตรงจุดที่ต้องการนับ</div>
</div>

<div class="tally" id="tally"></div>

<div class="counts">
  <div class="card" style="--c:var(--person)">
    <h2>คน</h2><div class="num" id="n-person">0</div>
    <div class="mv"><span>↑<b id="s-person">0</b></span><span>↰<b id="l-person">0</b></span><span>↱<b id="r-person">0</b></span></div>
    <div class="now" id="live-person">ในภาพ 0</div>
  </div>
  <div class="card" style="--c:var(--car)">
    <h2>รถยนต์</h2><div class="num" id="n-car">0</div>
    <div class="mv"><span>↑<b id="s-car">0</b></span><span>↰<b id="l-car">0</b></span><span>↱<b id="r-car">0</b></span></div>
    <div class="now" id="live-car">ในภาพ 0</div>
  </div>
  <div class="card" style="--c:var(--moto)">
    <h2>มอเตอร์ไซค์</h2><div class="num" id="n-motorcycle">0</div>
    <div class="mv"><span>↑<b id="s-motorcycle">0</b></span><span>↰<b id="l-motorcycle">0</b></span><span>↱<b id="r-motorcycle">0</b></span></div>
    <div class="now" id="live-motorcycle">ในภาพ 0</div>
  </div>
</div>

<div class="controls">
  <div class="row">
    <button class="primary" id="btnStart">เริ่มนับ</button>
    <button id="btnFlip" disabled>สลับกล้อง</button>
    <button id="btnReset" disabled>ล้างยอด</button>
    <button id="btnCsv" disabled>ส่งออก CSV</button>
  </div>
  <div class="row">
    <button id="btnFile">ใช้ไฟล์วิดีโอแทนกล้อง</button>
    <input type="file" id="fileIn" accept="video/*" hidden>
  </div>
  <details>
    <summary>ตั้งค่า</summary>
    <div class="set">
      <label for="axis">แนวเส้นนับ</label>
      <select id="axis"><option value="h">แนวนอน</option><option value="v">แนวตั้ง</option></select>
    </div>
    <div class="set">
      <label for="dir">ทิศทางที่นับ</label>
      <select id="dir">
        <option value="both">ทั้งสองทาง</option>
        <option value="fwd">ลง / ขวา เท่านั้น</option>
        <option value="bwd">ขึ้น / ซ้าย เท่านั้น</option>
      </select>
    </div>
    <div class="set">
      <label for="conf">ความมั่นใจขั้นต่ำ <span id="confVal">0.45</span></label>
      <input type="range" id="conf" min="0.2" max="0.8" step="0.05" value="0.45">
    </div>
    <div class="set">
      <label for="ang">มุมขั้นต่ำที่ถือว่าเลี้ยว <span id="angVal">30</span>°</label>
      <input type="range" id="ang" min="15" max="60" step="5" value="30">
    </div>
    <div class="set">
      <label for="heavy">นับรถบัส/รถบรรทุก เป็นรถยนต์</label>
      <input type="checkbox" id="heavy">
    </div>
  </details>
</div>

<script>
const CLASSES = {
  person:     { th:'คน',           color:'#FFC857' },
  car:        { th:'รถยนต์',        color:'#2EC4F1' },
  motorcycle: { th:'มอเตอร์ไซค์',   color:'#FF4D6D' }
};
const HEAVY = ['bus','truck'];

const $ = id => document.getElementById(id);
const video = $('video'), canvas = $('canvas'), ctx = canvas.getContext('2d');

let model = null, running = false, busy = false;
let facing = 'environment', stream = null;
let linePos = 0.5, dragging = false;
let tracks = [], nextId = 1;
let totals = { person:0, car:0, motorcycle:0 };
let mv = { person:{s:0,l:0,r:0}, car:{s:0,l:0,r:0}, motorcycle:{s:0,l:0,r:0} };
const MV_TH = { s:'ตรงไป', l:'เลี้ยวซ้าย', r:'เลี้ยวขวา' };
const MV_ICON = { s:'↑', l:'↰', r:'↱' };
let log = [];
let lastT = 0, fpsAvg = 0;

/* ---------- โหลดไลบรารี (ลองหลาย CDN) ---------- */
function loadScript(urls){
  return new Promise((resolve, reject) => {
    let i = 0;
    const next = () => {
      if (i >= urls.length) return reject(new Error('โหลดไลบรารีไม่สำเร็จ'));
      const s = document.createElement('script');
      s.src = urls[i++];
      s.onload = resolve;
      s.onerror = next;
      document.head.appendChild(s);
    };
    next();
  });
}
async function loadModel(){
  setStatus('กำลังโหลดโมเดลตรวจจับ… (ครั้งแรกใช้เน็ตราว 5–10 MB)');
  await loadScript([
    'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/tensorflow/4.22.0/tf.min.js',
    'https://unpkg.com/@tensorflow/tfjs@4.22.0/dist/tf.min.js'
  ]);
  await loadScript([
    'https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3',
    'https://unpkg.com/@tensorflow-models/coco-ssd@2.2.3'
  ]);
  model = await cocoSsd.load({ base:'lite_mobilenet_v2' });
}

/* ---------- กล้อง ---------- */
async function startCamera(){
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode:{ ideal: facing }, width:{ ideal:1280 }, height:{ ideal:720 } },
    audio: false
  });
  video.srcObject = stream;
  await video.play();
  video.style.opacity = 1;
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
}

/* ---------- ตัวติดตามวัตถุแบบง่าย (IoU matching) ---------- */
function iou(a,b){
  const x1 = Math.max(a[0],b[0]), y1 = Math.max(a[1],b[1]);
  const x2 = Math.min(a[0]+a[2], b[0]+b[2]), y2 = Math.min(a[1]+a[3], b[1]+b[3]);
  const w = Math.max(0,x2-x1), h = Math.max(0,y2-y1);
  const inter = w*h;
  return inter / (a[2]*a[3] + b[2]*b[3] - inter + 1e-6);
}
function updateTracks(dets){
  const used = new Set();
  for (const t of tracks){
    let best = -1, bestIou = 0.25;
    dets.forEach((d,i) => {
      if (used.has(i) || d.cls !== t.cls) return;
      const s = iou(t.box, d.box);
      if (s > bestIou){ bestIou = s; best = i; }
    });
    if (best >= 0){
      const d = dets[best]; used.add(best);
      t.prev = { x:t.cx, y:t.cy };
      t.box = d.box; t.cx = d.cx; t.cy = d.cy; t.missed = 0;
      t.path.push({ x:d.cx, y:d.cy });
      if (t.path.length > 40) t.path.shift();
    } else {
      t.missed++;
    }
  }
  dets.forEach((d,i) => {
    if (used.has(i)) return;
    tracks.push({ id:nextId++, cls:d.cls, box:d.box, cx:d.cx, cy:d.cy, prev:null,
                  path:[{x:d.cx,y:d.cy}], missed:0, counted:false,
                  pending:false, entryVec:null, crossAt:null, mv:null, logIdx:-1 });
  });
  // แทร็กที่หายไปแล้ว: ตัดสินทิศทางด้วยข้อมูลเท่าที่มี ก่อนทิ้ง
  tracks.filter(t => t.missed >= 8 && t.pending).forEach(t => resolveMove(t, true));
  tracks = tracks.filter(t => t.missed < 8);
}
function checkCrossing(){
  const axis = $('axis').value, dir = $('dir').value;
  const limit = axis === 'h' ? canvas.height * linePos : canvas.width * linePos;
  for (const t of tracks){
    if (t.counted || !t.prev) continue;
    const before = axis === 'h' ? t.prev.y : t.prev.x;
    const after  = axis === 'h' ? t.cy    : t.cx;
    const fwd = before < limit && after >= limit;
    const bwd = before > limit && after <= limit;
    if (!fwd && !bwd) continue;
    if (dir === 'fwd' && !fwd) continue;
    if (dir === 'bwd' && !bwd) continue;
    t.counted = true;
    t.pending = true;
    t.crossAt = { x:t.cx, y:t.cy };
    t.entryVec = headingVec(t.path);       // ทิศตอนเข้าเส้น
    totals[t.cls]++;
    t.logIdx = log.length;
    log.push({ t:new Date().toISOString(), cls:t.cls, dir: fwd ? 'fwd' : 'bwd', mv:null });
    addTick(t.cls);
    $('n-' + t.cls).textContent = totals[t.cls];
  }
}

/* เวกเตอร์ทิศทางล่าสุด: จากจุดเก่าที่ห่างพอ → จุดปัจจุบัน */
function headingVec(path, minLen){
  const min = minLen || 6;
  const last = path[path.length-1];
  for (let i = path.length - 2; i >= 0; i--){
    const dx = last.x - path[i].x, dy = last.y - path[i].y;
    if (Math.hypot(dx, dy) >= min) return { x:dx, y:dy };
  }
  return null;
}

/* จำแนก ตรงไป / เลี้ยวซ้าย / เลี้ยวขวา จากมุมที่ทิศทางเปลี่ยนไปหลังข้ามเส้น */
function resolveMove(t, force){
  if (!t.pending) return;
  const dist = t.crossAt ? Math.hypot(t.cx - t.crossAt.x, t.cy - t.crossAt.y) : 0;
  const need = Math.max(canvas.width, canvas.height) * 0.22;
  if (!force && dist < need) return;

  const v1 = t.entryVec, v2 = headingVec(t.path, 8);
  let m = 's';
  if (v1 && v2){
    let cross = v1.x*v2.y - v1.y*v2.x;
    const dot = v1.x*v2.x + v1.y*v2.y;
    if (facing === 'user') cross = -cross;          // กล้องหน้าภาพกลับด้าน
    const deg = Math.atan2(cross, dot) * 180 / Math.PI;
    const th = parseFloat($('ang').value);
    if (deg > th) m = 'r';
    else if (deg < -th) m = 'l';
  }
  t.pending = false;
  t.mv = m;
  mv[t.cls][m]++;
  if (t.logIdx >= 0) log[t.logIdx].mv = m;
  $(({s:'s',l:'l',r:'r'})[m] + '-' + t.cls).textContent = mv[t.cls][m];
}
function addTick(cls){
  const strip = $('tally');
  const el = document.createElement('span');
  el.className = 'tick';
  el.style.background = CLASSES[cls].color;
  strip.appendChild(el);
  while (strip.children.length > 60) strip.removeChild(strip.firstChild);
}

/* ---------- วาดภาพ ---------- */
function draw(){
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  const axis = $('axis').value;

  // เส้นนับ
  ctx.save();
  ctx.strokeStyle = '#7CFFB2';
  ctx.lineWidth = Math.max(2, canvas.width/300);
  ctx.setLineDash([14, 10]);
  ctx.beginPath();
  if (axis === 'h'){
    const y = canvas.height * linePos;
    ctx.moveTo(0, y); ctx.lineTo(canvas.width, y);
  } else {
    const x = canvas.width * linePos;
    ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
  }
  ctx.stroke();
  ctx.restore();

  // กรอบวัตถุ
  const fs = Math.max(12, canvas.width/45);
  ctx.font = `600 ${fs}px 'IBM Plex Sans Thai', sans-serif`;
  ctx.textBaseline = 'top';
  for (const t of tracks){
    if (t.missed > 0) continue;
    const c = CLASSES[t.cls].color;
    ctx.strokeStyle = c;
    ctx.lineWidth = Math.max(2, canvas.width/320);
    ctx.strokeRect(t.box[0], t.box[1], t.box[2], t.box[3]);

    // เส้นทางที่วิ่งมา (ช่วยดูว่าเลี้ยวจริงไหม)
    if (t.path.length > 2){
      ctx.save();
      ctx.globalAlpha = .55; ctx.setLineDash([]); ctx.strokeStyle = c; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(t.path[0].x, t.path[0].y);
      for (let i = 1; i < t.path.length; i++) ctx.lineTo(t.path[i].x, t.path[i].y);
      ctx.stroke();
      ctx.restore();
    }

    const label = CLASSES[t.cls].th + (t.mv ? ' ' + MV_ICON[t.mv] : (t.counted ? ' …' : ''));
    const w = ctx.measureText(label).width + 10;
    ctx.fillStyle = c;
    ctx.fillRect(t.box[0], Math.max(0, t.box[1] - fs - 6), w, fs + 6);
    ctx.fillStyle = '#0E1216';
    ctx.fillText(label, t.box[0] + 5, Math.max(0, t.box[1] - fs - 3));
  }
}

/* ---------- ลูปตรวจจับ ---------- */
async function loop(){
  if (!running) return;
  if (!busy){
    busy = true;
    try {
      const preds = await model.detect(video, 20, parseFloat($('conf').value));
      const heavy = $('heavy').checked;
      const dets = [];
      for (const p of preds){
        let cls = p.class;
        if (heavy && HEAVY.includes(cls)) cls = 'car';
        if (!CLASSES[cls]) continue;
        dets.push({ cls, box:p.bbox, cx:p.bbox[0] + p.bbox[2]/2, cy:p.bbox[1] + p.bbox[3]/2 });
      }
      updateTracks(dets);
      checkCrossing();
      tracks.forEach(t => resolveMove(t, false));
      const live = { person:0, car:0, motorcycle:0 };
      dets.forEach(d => live[d.cls]++);
      for (const k in live) $('live-' + k).textContent = 'ในภาพ ' + live[k];

      const now = performance.now();
      if (lastT){
        fpsAvg = fpsAvg ? fpsAvg*0.8 + (1000/(now-lastT))*0.2 : 1000/(now-lastT);
        $('fps').textContent = fpsAvg.toFixed(1) + ' fps';
      }
      lastT = now;
    } catch(e){
      console.error(e);
    }
    busy = false;
  }
  draw();
  requestAnimationFrame(loop);
}

/* ---------- ลากเส้นนับ ---------- */
const stage = $('stage');
function movLine(e){
  const r = stage.getBoundingClientRect();
  const p = e.touches ? e.touches[0] : e;
  linePos = $('axis').value === 'h'
    ? (p.clientY - r.top) / r.height
    : (p.clientX - r.left) / r.width;
  linePos = Math.min(0.97, Math.max(0.03, linePos));
  tracks.forEach(t => t.counted = false);
}
stage.addEventListener('pointerdown', e => { dragging = true; movLine(e); });
stage.addEventListener('pointermove', e => { if (dragging) movLine(e); });
window.addEventListener('pointerup', () => dragging = false);

/* ---------- ปุ่มต่าง ๆ ---------- */
function setStatus(s, live){
  $('status').textContent = s;
  $('dot').classList.toggle('live', !!live);
}
$('conf').addEventListener('input', e => $('confVal').textContent = parseFloat(e.target.value).toFixed(2));
$('ang').addEventListener('input', e => $('angVal').textContent = e.target.value);

$('btnStart').onclick = async () => {
  if (running){
    running = false;
    $('btnStart').textContent = 'เริ่มนับ';
    setStatus('หยุดชั่วคราว — ยอดสะสมยังอยู่ครบ');
    return;
  }
  $('btnStart').disabled = true;
  try {
    if (!model) await loadModel();
    setStatus('กำลังขอสิทธิ์ใช้กล้อง…');
    await startCamera();
    $('hint').style.display = 'none';
    running = true;
    ['btnFlip','btnReset','btnCsv'].forEach(id => $(id).disabled = false);
    $('btnStart').textContent = 'หยุด';
    setStatus('กำลังนับ — ลากเส้นเขียวไปวางจุดที่ต้องการ', true);
    loop();
  } catch(err){
    setStatus('เริ่มไม่ได้: ' + err.message);
    $('hint').innerHTML = 'เปิดกล้องไม่ได้<br><span style="font-size:12px">' + err.message +
      '<br><br>กล้องใช้ได้เฉพาะหน้าเว็บที่เปิดผ่าน https หรือ localhost และต้องอนุญาตสิทธิ์กล้องในเบราว์เซอร์</span>';
    $('hint').style.display = 'block';
  }
  $('btnStart').disabled = false;
};
$('btnFile').onclick = () => $('fileIn').click();
$('fileIn').onchange = async (e) => {
  const f = e.target.files[0];
  if (!f) return;
  try {
    if (!model) await loadModel();
    if (stream){ stream.getTracks().forEach(t => t.stop()); stream = null; }
    video.srcObject = null;
    video.src = URL.createObjectURL(f);
    video.loop = true;
    await video.play();
    video.style.opacity = 1;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    tracks = [];
    $('hint').style.display = 'none';
    running = true;
    ['btnFlip','btnReset','btnCsv'].forEach(id => $(id).disabled = false);
    $('btnFlip').disabled = true;
    $('btnStart').textContent = 'หยุด';
    setStatus('กำลังนับจากไฟล์วิดีโอ', true);
    loop();
  } catch(err){
    setStatus('เล่นไฟล์ไม่ได้: ' + err.message);
  }
};
$('btnFlip').onclick = async () => {
  facing = facing === 'environment' ? 'user' : 'environment';
  try { await startCamera(); tracks = []; } catch(e){ setStatus('สลับกล้องไม่ได้: ' + e.message); }
};
$('btnReset').onclick = () => {
  totals = { person:0, car:0, motorcycle:0 };
  mv = { person:{s:0,l:0,r:0}, car:{s:0,l:0,r:0}, motorcycle:{s:0,l:0,r:0} };
  log = []; tracks = [];
  for (const k in totals){
    $('n-' + k).textContent = '0';
    ['s','l','r'].forEach(m => $(m + '-' + k).textContent = '0');
  }
  $('tally').innerHTML = '';
  setStatus('ล้างยอดแล้ว เริ่มนับใหม่จาก 0', running);
};
$('btnCsv').onclick = () => {
  if (!log.length) return setStatus('ยังไม่มีข้อมูลให้ส่งออก', running);
  const rows = ['เวลา,ประเภท,ข้ามเส้นทาง,การเลี้ยว'];
  log.forEach(r => rows.push(
    `${r.t},${CLASSES[r.cls].th},${r.dir === 'fwd' ? 'ลง/ขวา' : 'ขึ้น/ซ้าย'},${r.mv ? MV_TH[r.mv] : 'ยังไม่สรุป'}`));
  rows.push('', 'สรุป,ตรงไป,เลี้ยวซ้าย,เลี้ยวขวา,รวม');
  for (const k in totals) rows.push(`${CLASSES[k].th},${mv[k].s},${mv[k].l},${mv[k].r},${totals[k]}`);
  const blob = new Blob(['\uFEFF' + rows.join('\n')], { type:'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'traffic-count-' + new Date().toISOString().slice(0,19).replace(/[:T]/g,'-') + '.csv';
  a.click();
  URL.revokeObjectURL(a.href);
};
</script>
</body>
</html>
